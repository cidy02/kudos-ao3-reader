<!DOCTYPE html>
<!--
  Representative (hand-built, not scraped) snapshot of AO3's logged-in page header.
  It mirrors the real markup the auth parser depends on: body.logged-in, the
  #greeting dropdown with a /users/<name> link, and a /users/logout control.
  Update this fixture when AO3 changes that header so the parser test fails loudly.
-->
<html lang="en">
<head><title>Archive of Our Own</title></head>
<body class="dashboard logged-in">
  <div id="header" class="region">
    <h1 class="heading"><a href="/">Archive of Our Own</a></h1>
    <ul class="primary navigation actions" role="navigation">
      <li class="dropdown" id="greeting">
        <a class="dropdown-toggle" href="/users/AO3_Reader" data-toggle="dropdown" role="button">
          <img alt="" class="icon" src="/images/skins/iconsets/default/icon_user.png">
          <span>Hi, AO3_Reader!</span>
        </a>
        <ul class="menu dropdown-menu" role="menu">
          <li><a href="/users/AO3_Reader">My Dashboard</a></li>
          <li><a href="/users/AO3_Reader/preferences">My Preferences</a></li>
          <li><a href="/users/AO3_Reader/bookmarks">My Bookmarks</a></li>
          <li><a rel="nofollow" data-method="delete" href="/users/logout">Log Out</a></li>
        </ul>
      </li>
    </ul>
  </div>
  <div id="main" class="dashboard region"></div>
</body>
</html>
